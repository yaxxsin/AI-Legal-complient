# ============================================
# LocalCompliance — Docker Compose
# Full development stack: PostgreSQL + Redis + MinIO + API + Web
# Usage: docker-compose up -d
# ============================================

services:
  # ── PostgreSQL 16 ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: localcompliance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis 7 (BullMQ queue) ────────────────
  redis:
    image: redis:7-alpine
    container_name: lc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible storage) ─────────
  minio:
    image: minio/minio:latest
    container_name: lc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── NestJS API ────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lc-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/localcompliance
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
      JWT_SECRET: local-dev-jwt-secret-change-in-production-min32chars
      JWT_EXPIRATION: 1h
      JWT_REFRESH_EXPIRATION: 30d
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: localcompliance
      MINIO_USE_SSL: "false"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5
    ports:
      - "3001:3001"

  # ── Next.js Frontend ─────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lc-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
